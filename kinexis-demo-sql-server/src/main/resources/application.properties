spring.application.name=kinexis-demo-sql-server
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SQLSERVER_URL:jdbc:sqlserver://localhost:1433;databaseName=master;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SQLSERVER_USER:sa}
spring.datasource.password=${SQLSERVER_PASSWORD:Kinexis_password123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6382}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}

kinexis.stream.listener.pending.max-attempts=3
kinexis.stream.listener.pending.max-retention=120000
kinexis.stream.listener.pending.batch-size=50
kinexis.stream.listener.pending.fixed-delay=60000

logging.level.com.foogaro.kinexis=DEBUG
logging.level.com.foogaro.kinexis.demo.sqlserver=DEBUG
