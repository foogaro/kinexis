services:
  mongodb:
    image: mongo:7
    container_name: kinexis-demo-mongodb-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: kinexis
      MONGO_INITDB_ROOT_PASSWORD: kinexis
      MONGO_INITDB_DATABASE: kinexis
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' -u kinexis -p kinexis --authenticationDatabase admin | grep 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis/redis-stack-server:latest
    container_name: kinexis-demo-mongodb-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
