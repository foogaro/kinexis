services:
  mysql:
    image: mysql:8.4
    container_name: kinexis-demo-mysql-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: kinexis
      MYSQL_USER: kinexis
      MYSQL_PASSWORD: kinexis
      MYSQL_ROOT_PASSWORD: kinexis
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u kinexis -pkinexis --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis/redis-stack-server:latest
    container_name: kinexis-demo-mysql-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
