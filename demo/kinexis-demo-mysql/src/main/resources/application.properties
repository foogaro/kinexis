spring.application.name=kinexis-demo-mysql
server.port=${SERVER_PORT:8081}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/kinexis}
spring.datasource.username=${MYSQL_USER:kinexis}
spring.datasource.password=${MYSQL_PASSWORD:kinexis}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}

kinexis.stream.listener.pending.max-attempts=3
kinexis.stream.listener.pending.max-retention=120000
kinexis.stream.listener.pending.batch-size=50
kinexis.stream.listener.pending.fixed-delay=60000

logging.level.com.foogaro.kinexis=DEBUG
logging.level.com.foogaro.kinexis.demo.mysql=DEBUG
